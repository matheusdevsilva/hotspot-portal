<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>AcessaNet | Conectado</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="./images/logo.ico" type="image/x-icon">
  <style>
    :root {
      --primary: #0b5fa5;
      --secondary: #0b8fd6;
      --bg: #f4f7fb;
      --text: #1f2933;
      --muted: #6b7280;
      --white: #ffffff;
      --success: #16a34a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    /* FUNDO */
    body {
      min-height: 100svh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }


    /* CONTAINER */
    .wrapper {
      width: 100%;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* CARD */
    .card {
      background: var(--white);
      width: 40vw;
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .08);
      text-align: center;
    }

    .logo img {
      width: 110px;
      margin-bottom: 20px;
    }

    .check {
      font-size: 64px;
      color: var(--success);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .info {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    button {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: .25s;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #9ca3af;
    }

    @media (max-width:480px) {
      .card {
        width: 80vw;
        padding: 32px 22px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="card">

      <div class="logo">
        <img src="./images/logo.png" alt="AcessaNet">
      </div>

      <div class="check">✔</div>

      <h1>Conectado com sucesso!</h1>
      <div class="subtitle">Seu acesso à internet foi liberado</div>

      <div class="info">
        Você já pode navegar com segurança e qualidade na rede AcessaNet.
      </div>

      <!-- BOTÃO PARA NAVEGAR -->
      <form action="$(link-orig)" method="get">
        <button>Acessar a Internet</button>
      </form>
      
      <div class="footer">
        © AcessaNet • Todos os direitos reservados
      </div>

    </div>
  </div>

</body>

</html>
